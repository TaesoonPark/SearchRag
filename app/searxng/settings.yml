use_default_settings: true

general:
  instance_name: "SearchRag SearXNG"

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "change-this-searxng-secret"
  base_url: "http://localhost:8001/"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

ui:
  static_use_hash: true

enabled_plugins:
  - "Hash plugin"
  - "Self Information"
  - "Tracker URL remover"

engines:
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg

  - name: brave
    engine: brave
    shortcut: br
    disabled: true

  - name: startpage
    engine: startpage
    shortcut: sp

  - name: qwant
    engine: qwant
    shortcut: qw

  - name: wikipedia
    engine: wikipedia
    shortcut: wp

  - name: wikidata
    engine: wikidata
    shortcut: wd
