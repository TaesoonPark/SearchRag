services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searchrag-searxng
    restart: unless-stopped
    ports:
      - "8001:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      BASE_URL: http://localhost:8001/
      INSTANCE_NAME: SearchRag SearXNG
